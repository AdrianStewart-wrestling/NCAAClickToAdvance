<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA Wrestling Bracket Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bracket.css">
    <style>
        @media print {
            @page { size: 17in 11in landscape; margin: 0; }
            body::before { display: none !important; }
            body { background: #fff !important; }
            #weightSelector { display: none !important; }
            #toggleAABox    { display: none !important; }
            #accessModal    { display: none !important; }
            #pdfWrapper {
                position: relative !important;
                width: 16.8in !important;
                height: 10.5in !important;
                overflow: hidden !important;
                padding: 0 !important;
            }
            #bracketGrid {
                transform: scale(0.72);
                transform-origin: top left;
            }
            .match { break-inside: avoid; }
        }
        @media (max-width: 600px) {
            body { font-size: 14px; }
            .title { font-size: 1.3rem; }
            #weightSelector button { font-size: 11px; padding: 6px 10px; }
            #allAmericanBox { width: 90%; right: 5%; top: 10px; padding: 10px; }
            #accessModal > div { width: 90%; padding: 1rem; }
            #accessCodeInput { width: 100%; }
        }
    </style>
</head>
<body>

    <div style="height:4px;background:#1A3A6B;width:100%;"></div>

    <div id="weightSelector" style="
        display:flex; align-items:center; justify-content:center;
        flex-wrap:wrap; gap:8px; padding:14px 24px 12px;
        border-bottom:1.5px solid #D4C9B8; background:#fff;
        position:sticky; top:0; z-index:50;
        box-shadow:0 2px 8px rgba(0,0,0,.06);">
        <button data-weight="125">125</button>
        <button data-weight="133">133</button>
        <button data-weight="141">141</button>
        <button data-weight="149">149</button>
        <button data-weight="157">157</button>
        <button data-weight="165">165</button>
        <button data-weight="174">174</button>
        <button data-weight="184">184</button>
        <button data-weight="197">197</button>
        <button data-weight="285">285</button>
        <button onclick="exportBracketPDF()" style="margin-left:12px;">Export PDF</button>
    </div>

    <h1 class="title" id="bracketTitle">125 lb NCAA Bracket - Full View</h1>

    <div id="pdfWrapper" style="position:relative; width:100%; overflow-x:auto; padding:20px 16px 40px;">
        <div class="bracket-grid" id="bracketGrid"></div>
        <div id="allAmericanBox">
            <h3 id="aaTitle">NCAA All-Americans</h3>
            <ol id="aaList">
                <li>1st - TBD</li>
                <li>2nd - TBD</li>
                <li>3rd - TBD</li>
                <li>4th - TBD</li>
                <li>5th - TBD</li>
                <li>6th - TBD</li>
                <li>7th - TBD</li>
                <li>8th - TBD</li>
            </ol>
        </div>
    </div>

    <button onclick="debugAAUpdate()" style="
        position:fixed; bottom:14px; right:14px; z-index:9999;
        font-size:11px; padding:6px 12px; border-radius:6px;
        background:#EDEAE3; border:1.5px solid #D4C9B8;
        color:#8A8A9A; cursor:pointer; font-family:inherit;">SHOW AA</button>

    <link rel="manifest" href="./manifest.json" />
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>

    <script src="html2pdf.bundle.min.js"></script>
    <script src="app.js?v=20250529"></script>

    <script>
        /* ── WIDE CLASS INJECTION ──
           Watches the bracketGrid for repaints (app.js rebuilds innerHTML
           on every selection). After each repaint, any .match whose
           inline left <= 300px gets class="wide" — these are the
           pigtail (left:100) and Champ R1 (left:280) columns.
           Wide boxes show seed + name + school on one line.
           Narrow boxes (all later rounds) show name only. ── */
        function applyWideClasses() {
            document.querySelectorAll('#bracketGrid .match').forEach(el => {
                const left = parseInt(el.style.left, 10);
                if (!isNaN(left) && left <= 300) {
                    el.classList.add('wide');
                } else {
                    el.classList.remove('wide');
                }
            });
        }

        const _bracketGrid = document.getElementById('bracketGrid');
        if (_bracketGrid) {
            new MutationObserver(applyWideClasses)
                .observe(_bracketGrid, { childList: true });
        }

        /* Active weight pill */
        document.querySelectorAll('#weightSelector button[data-weight]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#weightSelector button[data-weight]')
                    .forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        window.addEventListener('DOMContentLoaded', () => {
            const first = document.querySelector('#weightSelector button[data-weight="125"]');
            if (first) first.classList.add('active');
        });

        /* PDF export */
        function exportBracketPDF() {
            const pdfWrapper = document.getElementById('pdfWrapper');
            const bracketGrid = document.getElementById('bracketGrid');
            const aaBox = document.getElementById('allAmericanBox');
            const wasHidden = aaBox.style.display === 'none' || aaBox.style.display === '';
            if (wasHidden) aaBox.style.display = 'block';

            // Scale the grid so it fits on one 17x11 landscape page
            // Grid is ~1300px wide, 1800px tall — target ~1632x1008px (96dpi @ 17x11in)
            // We scale to fit height: 1008/gridH
            const gridH = bracketGrid.offsetHeight || 1800;
            const scaleH = 1008 / gridH;
            const scaleW = 1584 / 1300;
            const scale  = Math.min(scaleH, scaleW, 1).toFixed(3);

            pdfWrapper.style.width           = '16.5in';
            pdfWrapper.style.height          = '10.5in';
            pdfWrapper.style.overflow        = 'hidden';
            bracketGrid.style.transform      = 'scale(' + scale + ')';
            bracketGrid.style.transformOrigin = 'top left';

            const opt = {
                margin: [0, 0, 0, 0],
                filename: document.getElementById('bracketTitle').innerText.replace(/ /g, '_') + '.pdf',
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true, allowTaint: true, scrollY: 0 },
                jsPDF: { unit: 'in', format: [17, 11], orientation: 'landscape' }
            };

            html2pdf().set(opt).from(pdfWrapper).save().then(function() {
                bracketGrid.style.transform      = '';
                bracketGrid.style.transformOrigin = '';
                pdfWrapper.style.width   = '';
                pdfWrapper.style.height  = '';
                pdfWrapper.style.overflow = '';
                if (wasHidden) aaBox.style.display = 'none';
            });
        }
    </script>

    <div id="accessModal" style="
        position:fixed; top:0; left:0; width:100%; height:100%;
        background:rgba(26,26,46,.75); display:flex;
        align-items:center; justify-content:center; z-index:9999;
        backdrop-filter:blur(4px);">
        <div style="
            background:#fff; padding:2.5rem 2rem; border-radius:14px;
            text-align:center; border:1.5px solid #D4C9B8;
            box-shadow:0 8px 32px rgba(0,0,0,.18);
            width:340px; max-width:90vw;">
            <h2 style="font-size:1.3rem; font-weight:700; color:#1A1A2E; margin-bottom:6px;">Enter Access Code</h2>
            <p style="font-size:13px; color:#8A8A9A; margin-bottom:20px;">Enter your code to view the bracket</p>
            <input id="accessCodeInput" type="text" placeholder="ACCESS CODE" style="
                width:100%; padding:10px 14px; border:1.5px solid #D4C9B8;
                border-radius:8px; font-size:15px; font-family:inherit;
                color:#1A1A2E; background:#F5F3EE; text-align:center;
                letter-spacing:.12em; outline:none;" />
            <button onclick="validateAccessCode()" style="
                margin-top:14px; width:100%; padding:11px;
                background:#1A3A6B; color:#fff; border:none;
                border-radius:8px; font-size:15px; font-weight:600;
                font-family:inherit; cursor:pointer;">Submit</button>
            <p id="accessError" style="color:#A32D2D; font-size:13px; margin-top:10px; display:none;">
                Invalid code — please try again.
            </p>
        </div>
    </div>

</body>
</html>
